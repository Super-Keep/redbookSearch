<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小红书搜索: {keyword}</title>
<style>
* {{ box-sizing: border-box; margin: 0; padding: 0; }}
body {{
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  padding: 24px;
  background: #f8f8f8;
  color: #333;
  line-height: 1.6;
}}
.container {{
  max-width: 900px;
  margin: 0 auto;
}}
.header {{
  background: #fff;
  padding: 28px;
  border-radius: 12px;
  margin-bottom: 20px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}}
.header h1 {{
  font-size: 22px;
  color: #ff2442;
  margin-bottom: 10px;
}}
.header .meta {{
  color: #666;
  font-size: 14px;
}}
.header .meta span {{
  margin-right: 16px;
}}
.ai-summary {{
  background: #fff;
  padding: 28px;
  border-radius: 12px;
  margin-bottom: 20px;
  border-left: 4px solid #ff2442;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}}
.ai-summary h2 {{
  font-size: 17px;
  color: #ff2442;
  margin-bottom: 14px;
}}
.ai-summary .content {{
  font-size: 14px;
  line-height: 1.9;
  color: #444;
}}
.notes-section {{
  margin-top: 8px;
}}
.notes-section h2 {{
  font-size: 17px;
  color: #333;
  margin-bottom: 16px;
  padding-left: 4px;
}}
.note-card {{
  background: #fff;
  padding: 22px;
  border-radius: 12px;
  margin-bottom: 14px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  transition: box-shadow 0.2s;
}}
.note-card:hover {{
  box-shadow: 0 4px 16px rgba(0,0,0,0.1);
}}
.note-title {{
  font-weight: 600;
  font-size: 16px;
  margin-bottom: 10px;
  color: #222;
}}
.note-content {{
  font-size: 14px;
  color: #555;
  line-height: 1.7;
  margin-bottom: 14px;
}}
.note-meta {{
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 16px;
  font-size: 13px;
  color: #888;
}}
.note-link {{
  color: #ff2442;
  text-decoration: none;
  font-weight: 500;
  margin-left: auto;
}}
.note-link:hover {{
  text-decoration: underline;
}}
.empty-state {{
  text-align: center;
  padding: 60px 20px;
  color: #999;
  font-size: 15px;
}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🔍 小红书搜索: {keyword}</h1>
    <div class="meta">
      <span>🕐 {current_time}</span>
      <span>📊 {sort_display}</span>
      <span>📝 共 {note_count} 条结果</span>
    </div>
  </div>

  <div class="ai-summary">
    <h2>📊 AI 内容总结</h2>
    <div class="content">{ai_summary}</div>
  </div>

  <div class="notes-section">
    <h2>📋 笔记列表</h2>
    {notes_html}
  </div>
</div>
</body>
</html>
